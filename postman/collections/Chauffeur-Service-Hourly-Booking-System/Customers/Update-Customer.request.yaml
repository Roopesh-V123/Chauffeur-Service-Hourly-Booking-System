$kind: http-request
name: Update Customer
method: PUT
url: '{{baseUrl}}/api/customers/{{customerId}}'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "V.Roopesh",
      "email": "v.roopesh.updated@chauffeurservice.in",
      "phone": "+91-9876543299"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Response time is less than 2000ms", function () { pm.expect(pm.response.responseTime).to.be.below(2000); });
      pm.test("Response has JSON body", function () { pm.response.to.be.json; });
