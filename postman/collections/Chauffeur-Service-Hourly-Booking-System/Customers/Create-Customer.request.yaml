$kind: http-request
name: Create Customer
method: POST
url: '{{baseUrl}}/api/customers'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "V.Roopesh",
      "email": "v.roopesh@chauffeurservice.in",
      "phone": "+91-9876543210"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201 Created", function () { pm.response.to.have.status(201); });
      pm.test("Response time is less than 2000ms", function () { pm.expect(pm.response.responseTime).to.be.below(2000); });
      pm.test("Response has JSON body", function () { pm.response.to.be.json; });
      pm.test("Response contains id field", function () { var jsonData = pm.response.json(); pm.expect(jsonData).to.have.property("id"); });
