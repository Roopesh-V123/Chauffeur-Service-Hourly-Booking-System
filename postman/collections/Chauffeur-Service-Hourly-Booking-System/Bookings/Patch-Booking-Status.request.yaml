$kind: http-request
name: Patch Booking Status
method: PATCH
url: '{{baseUrl}}/api/chauffeur_service_hourly_booking/{{bookingId}}/status'
order: 7000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "Completed"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Response time is less than 2000ms", function () { pm.expect(pm.response.responseTime).to.be.below(2000); });
      pm.test("Response has JSON body", function () { pm.response.to.be.json; });
