$kind: http-request
name: Update Payment
method: PUT
url: '{{baseUrl}}/api/payments/{{paymentId}}'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "amount": 4200.00,
      "status": "Paid",
      "transaction_reference": "TXN-ROOPESH-2026-002"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Response time is less than 2000ms", function () { pm.expect(pm.response.responseTime).to.be.below(2000); });
      pm.test("Response has JSON body", function () { pm.response.to.be.json; });
