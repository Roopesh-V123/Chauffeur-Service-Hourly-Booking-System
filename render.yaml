# Render blueprint configuration for automated multi-service deployment
# Author: V.Roopesh (ID: 252U1R1249)
# Day 22: Chauffeur Service Hourly Booking System Monorepo Deployment

databases:
  - name: chauffeur-prod-db
    plan: free
    databaseName: chauffeur_service_prod
    user: roopesh_admin

services:
  - type: web
    name: chauffeur-booking-backend-api
    runtime: node
    plan: free
    healthCheckPath: /health
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chauffeur-prod-db
          property: connectionString
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
